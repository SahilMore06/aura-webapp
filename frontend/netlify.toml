[build]
  command = "npm run build"
  publish = "dist"

# Env vars needed at build time (set these in Netlify dashboard)
[build.environment]
  NODE_VERSION = "20"

# SPA redirect — all routes serve index.html for client-side routing
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# Caching for static assets (hashed filenames = safe to cache forever)
[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# Security headers
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
