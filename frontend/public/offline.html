<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AURA — No Connection</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      min-height: 100vh;
      background: #0A0F1E;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      color: #F1F5F9;
      padding: 24px;
      text-align: center;
    }

    .orb {
      width: 120px;
      height: 120px;
      border-radius: 50%;
      background: radial-gradient(circle at 40% 35%, rgba(0,212,170,0.15), rgba(0,102,255,0.08), transparent 70%);
      border: 1.5px solid rgba(0,212,170,0.25);
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 32px;
      box-shadow: 0 0 60px rgba(0,212,170,0.08);
      animation: pulse 3s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { box-shadow: 0 0 40px rgba(0,212,170,0.08); }
      50%       { box-shadow: 0 0 80px rgba(0,212,170,0.18); }
    }

    .wifi-icon {
      font-size: 48px;
      opacity: 0.6;
    }

    h1 {
      font-size: 22px;
      font-weight: 700;
      margin-bottom: 12px;
      color: #F1F5F9;
    }

    p {
      font-size: 14px;
      color: #64748B;
      line-height: 1.6;
      max-width: 280px;
      margin-bottom: 32px;
    }

    .btn {
      background: linear-gradient(135deg, #00D4AA, #0066FF);
      color: #0A0F1E;
      font-weight: 700;
      font-size: 15px;
      border: none;
      border-radius: 14px;
      padding: 14px 32px;
      cursor: pointer;
      transition: opacity 0.2s;
    }

    .btn:active { opacity: 0.8; }

    .status {
      margin-top: 20px;
      font-size: 12px;
      color: #334155;
    }
  </style>
</head>
<body>
  <div class="orb">
    <span class="wifi-icon">📡</span>
  </div>
  <h1>No Internet Connection</h1>
  <p>AURA needs an internet connection to show you live air quality data. Please check your Wi-Fi or mobile data.</p>
  <button class="btn" onclick="retryConnection()">Try Again</button>
  <p class="status" id="status">Checking connection…</p>

  <script>
    function retryConnection() {
      document.getElementById('status').textContent = 'Retrying…';
      // Try loading the primary URL
      fetch('https://auraweapp.vercel.app/favicon.svg', { mode: 'no-cors', cache: 'no-store' })
        .then(() => {
          document.getElementById('status').textContent = 'Connection restored! Loading…';
          window.location.reload();
        })
        .catch(() => {
          // Try Netlify fallback
          fetch('https://aura-air-quality.netlify.app/favicon.svg', { mode: 'no-cors', cache: 'no-store' })
            .then(() => {
              document.getElementById('status').textContent = 'Loading from backup server…';
              window.location.href = 'https://aura-air-quality.netlify.app';
            })
            .catch(() => {
              document.getElementById('status').textContent = 'Still offline. Please check your connection.';
            });
        });
    }

    // Auto-retry every 10 seconds
    setInterval(() => {
      if (navigator.onLine) retryConnection();
    }, 10000);

    // Listen for network back online event
    window.addEventListener('online', () => {
      document.getElementById('status').textContent = 'Connection detected! Reloading…';
      setTimeout(() => window.location.reload(), 800);
    });

    document.getElementById('status').textContent =
      navigator.onLine ? 'Device connected but server unreachable.' : 'Device is offline.';
  </script>
</body>
</html>
