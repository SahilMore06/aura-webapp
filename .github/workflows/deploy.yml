name: 🤖 AURA — Auto Build & Deploy

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

# Cancel in-progress runs on new push
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ─────────────────────────────────────────────────────────────
  # JOB 1: Build frontend (Vite)
  # Vercel & Netlify pick this up automatically via their GitHub
  # integrations — this job just validates the build is clean.
  # ─────────────────────────────────────────────────────────────
  build-web:
    name: 🌐 Build Web (Vite)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Build
        run: npm run build
        env:
          VITE_SUPABASE_URL:       ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY:  ${{ secrets.VITE_SUPABASE_ANON_KEY }}
          VITE_GOOGLE_AQ_API_KEY:  ${{ secrets.VITE_GOOGLE_AQ_API_KEY }}
          VITE_ML_API_URL:         ${{ secrets.VITE_ML_API_URL }}

      - name: Upload dist artifact
        uses: actions/upload-artifact@v4
        with:
          name: web-dist
          path: frontend/dist
          retention-days: 1

  # ─────────────────────────────────────────────────────────────
  # JOB 2: Build APK (only on push to main, not on PRs)
  # Uses the WebView approach — APK loads VERCEL_URL at runtime.
  # You only need to rebuild if you change native Capacitor code.
  # ─────────────────────────────────────────────────────────────
  build-apk:
    name: 📱 Build APK (WebView)
    runs-on: ubuntu-latest
    needs: build-web
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Setup Java 17 (required for Android Gradle)
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci --legacy-peer-deps

      - name: Build web (for Capacitor sync)
        working-directory: frontend
        run: npm run build
        env:
          VITE_SUPABASE_URL:       ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY:  ${{ secrets.VITE_SUPABASE_ANON_KEY }}
          VITE_GOOGLE_AQ_API_KEY:  ${{ secrets.VITE_GOOGLE_AQ_API_KEY }}
          VITE_ML_API_URL:         ${{ secrets.VITE_ML_API_URL }}

      - name: Sync Capacitor
        working-directory: frontend
        run: npx cap sync android

      - name: Make Gradle executable
        working-directory: frontend/android
        run: chmod +x gradlew

      - name: Build debug APK
        working-directory: frontend/android
        run: ./gradlew assembleDebug --no-daemon

      - name: Upload APK to GitHub Releases
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/heads/main') || startsWith(github.ref, 'refs/heads/master')
        with:
          tag_name: apk-${{ github.run_number }}
          name: "AURA APK — Build #${{ github.run_number }}"
          body: |
            🚀 Auto-built from commit ${{ github.sha }}
            📅 ${{ github.event.head_commit.timestamp }}
            💬 ${{ github.event.head_commit.message }}

            **This APK loads the live Vercel deployment — updates instantly without reinstalling.**
          files: frontend/android/app/build/outputs/apk/debug/app-debug.apk
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: aura-debug-apk
          path: frontend/android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30

  # ─────────────────────────────────────────────────────────────
  # JOB 3: Build iOS IPA for TestFlight (macOS runner)
  # Produces a REAL DEVICE IPA signed for App Store / TestFlight.
  # WebView loads auraweapp.vercel.app — instant updates without rebuild.
  #
  # Required GitHub Secrets:
  #   BUILD_CERTIFICATE_BASE64    — your .p12 cert (base64 encoded)
  #   P12_PASSWORD                — password for the .p12 cert
  #   BUILD_PROVISION_PROFILE_BASE64 — your .mobileprovision (base64)
  #   KEYCHAIN_PASSWORD           — any random password for temp keychain
  #   APP_STORE_CONNECT_KEY_ID    — App Store Connect API Key ID
  #   APP_STORE_CONNECT_ISSUER_ID — App Store Connect Issuer ID
  #   APP_STORE_CONNECT_KEY_BASE64 — .p8 key file (base64 encoded)
  # ─────────────────────────────────────────────────────────────
  build-ios:
    name: 🍎 Build iOS for TestFlight
    runs-on: macos-latest
    needs: build-web
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci --legacy-peer-deps && npm install react-is

      - name: Build web (for Capacitor sync)
        working-directory: frontend
        run: npm run build
        env:
          VITE_SUPABASE_URL:       ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY:  ${{ secrets.VITE_SUPABASE_ANON_KEY }}
          VITE_GOOGLE_AQ_API_KEY:  ${{ secrets.VITE_GOOGLE_AQ_API_KEY }}
          VITE_ML_API_URL:         ${{ secrets.VITE_ML_API_URL }}

      - name: Sync Capacitor iOS
        working-directory: frontend
        run: npx cap sync ios

      - name: Install CocoaPods
        run: gem install cocoapods --no-document

      - name: Install Pod dependencies
        working-directory: frontend/ios/App
        run: pod install --repo-update

      # ── Code Signing ──────────────────────────────────────────
      - name: Import signing certificate
        if: ${{ env.BUILD_CERTIFICATE_BASE64 != '' }}
        env:
          BUILD_CERTIFICATE_BASE64: ${{ secrets.BUILD_CERTIFICATE_BASE64 }}
          P12_PASSWORD: ${{ secrets.P12_PASSWORD }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
        run: |
          CERTIFICATE_PATH=$RUNNER_TEMP/certificate.p12
          KEYCHAIN_PATH=$RUNNER_TEMP/signing.keychain-db
          echo -n "$BUILD_CERTIFICATE_BASE64" | base64 --decode -o $CERTIFICATE_PATH
          security create-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH
          security set-keychain-settings -lut 21600 $KEYCHAIN_PATH
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH
          security import $CERTIFICATE_PATH -P "$P12_PASSWORD" -A \
            -t cert -f pkcs12 -k $KEYCHAIN_PATH
          security list-keychain -d user -s $KEYCHAIN_PATH

      - name: Install provisioning profile
        if: ${{ env.BUILD_PROVISION_PROFILE_BASE64 != '' }}
        env:
          BUILD_PROVISION_PROFILE_BASE64: ${{ secrets.BUILD_PROVISION_PROFILE_BASE64 }}
        run: |
          PP_PATH=$RUNNER_TEMP/profile.mobileprovision
          echo -n "$BUILD_PROVISION_PROFILE_BASE64" | base64 --decode -o $PP_PATH
          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          cp $PP_PATH ~/Library/MobileDevice/Provisioning\ Profiles/

      # ── Build Archive ──────────────────────────────────────────
      - name: Build iOS archive
        working-directory: frontend/ios/App
        run: |
          xcodebuild archive \
            -workspace App.xcworkspace \
            -scheme App \
            -configuration Release \
            -archivePath $RUNNER_TEMP/AURA.xcarchive \
            -destination "generic/platform=iOS" \
            CODE_SIGN_STYLE=Automatic \
            DEVELOPMENT_TEAM="${{ secrets.APPLE_TEAM_ID }}" \
            -allowProvisioningUpdates

      # ── Export IPA ─────────────────────────────────────────────
      - name: Export IPA
        working-directory: frontend/ios/App
        run: |
          cat > $RUNNER_TEMP/ExportOptions.plist <<EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>method</key>
            <string>app-store-connect</string>
            <key>teamID</key>
            <string>${{ secrets.APPLE_TEAM_ID }}</string>
            <key>uploadBitcode</key>
            <false/>
            <key>compileBitcode</key>
            <false/>
            <key>uploadSymbols</key>
            <true/>
          </dict>
          </plist>
          EOF
          xcodebuild -exportArchive \
            -archivePath $RUNNER_TEMP/AURA.xcarchive \
            -exportPath $RUNNER_TEMP/IPA \
            -exportOptionsPlist $RUNNER_TEMP/ExportOptions.plist \
            -allowProvisioningUpdates

      # ── Upload to TestFlight ───────────────────────────────────
      - name: Upload to TestFlight (App Store Connect API)
        if: ${{ env.APP_STORE_CONNECT_KEY_ID != '' }}
        env:
          APP_STORE_CONNECT_KEY_ID:     ${{ secrets.APP_STORE_CONNECT_KEY_ID }}
          APP_STORE_CONNECT_ISSUER_ID:  ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}
          APP_STORE_CONNECT_KEY_BASE64: ${{ secrets.APP_STORE_CONNECT_KEY_BASE64 }}
        run: |
          KEY_PATH=$RUNNER_TEMP/AuthKey.p8
          echo -n "$APP_STORE_CONNECT_KEY_BASE64" | base64 --decode -o $KEY_PATH
          xcrun altool --upload-app \
            --type ios \
            --file "$RUNNER_TEMP/IPA/App.ipa" \
            --apiKey "$APP_STORE_CONNECT_KEY_ID" \
            --apiIssuer "$APP_STORE_CONNECT_ISSUER_ID" \
            --apiKey-file "$KEY_PATH"

      - name: Upload IPA to GitHub Releases
        uses: softprops/action-gh-release@v2
        with:
          tag_name: build-${{ github.run_number }}
          name: "AURA Build #${{ github.run_number }}"
          body: |
            🍎 iOS IPA for TestFlight
            🤖 Android APK (debug)
            📅 ${{ github.event.head_commit.timestamp }}
            💬 ${{ github.event.head_commit.message }}
          files: ${{ runner.temp }}/IPA/App.ipa
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: aura-ios-ipa
          path: ${{ runner.temp }}/IPA/App.ipa
          retention-days: 30
