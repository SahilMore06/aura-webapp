<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#0D1829"/>
      <stop offset="100%" stop-color="#0A0F1E"/>
    </radialGradient>
    <radialGradient id="orb" cx="50%" cy="40%" r="55%">
      <stop offset="0%" stop-color="#00D4AA" stop-opacity="0.25"/>
      <stop offset="60%" stop-color="#0066FF" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#0A0F1E" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="ring" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#00D4AA"/>
      <stop offset="100%" stop-color="#0066FF"/>
    </linearGradient>
    <linearGradient id="leaf" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#00D4AA"/>
      <stop offset="100%" stop-color="#00A8FF"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="0.6" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <!-- Background -->
  <rect width="32" height="32" rx="7" fill="url(#bg)"/>
  <!-- Ambient glow -->
  <circle cx="16" cy="15" r="12" fill="url(#orb)"/>
  <!-- Outer ring -->
  <circle cx="16" cy="15" r="11" fill="none" stroke="url(#ring)" stroke-width="0.8" opacity="0.7"/>
  <!-- Inner ring -->
  <circle cx="16" cy="15" r="8.5" fill="none" stroke="url(#ring)" stroke-width="0.5" opacity="0.4"/>
  <!-- Leaf + wind icon (simplified) -->
  <g filter="url(#glow)" stroke="url(#leaf)" stroke-width="1.1" fill="none" stroke-linecap="round" stroke-linejoin="round">
    <!-- Leaf -->
    <path d="M13 10 Q18 9 18 14 Q18 18 13 17 Q10 14 13 10Z"/>
    <line x1="13" y1="10" x2="16.5" y2="16.5"/>
    <!-- Wind curl -->
    <path d="M11 18.5 Q14 18 15.5 19.5 Q17 21 15 21.5 Q13 22 12.5 21"/>
    <path d="M12 20.5 Q15 20 16.5 21 Q17.5 21.8 17 22.5"/>
  </g>
</svg>
