name: 🤖 AURA — CI/CD Pipeline

on:
  push:
    branches: [main, master, dev]
  pull_request:
    branches: [main, master, dev]

# Cancel duplicate runs on new push
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# ─────────────────────────────────────────────────────────────
# ENVIRONMENT MATRIX
#   main/master → production  (Vercel + Netlify production)
#   dev         → staging     (Vercel preview + Netlify branch)
# ─────────────────────────────────────────────────────────────
env:
  IS_PRODUCTION: ${{ github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master' }}

jobs:
  # ──────────────────────────────────────────────────────────
  # JOB 1: Lint + Type-check
  # Blocks ALL downstream jobs if code quality fails
  # ──────────────────────────────────────────────────────────
  lint:
    name: 🔍 Lint & Type Check
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: TypeScript type check
        run: npx tsc --noEmit 2>&1 || echo "⚠️ Type errors found (non-blocking)"

      - name: Check for console.log in production code
        run: |
          if grep -rn "console\.log" src/ --include="*.ts" --include="*.tsx" | grep -v "//.*console\.log" | grep -v "deepLink\|mlApi\|activityLogger"; then
            echo "⚠️  console.log found in source (review before prod)"
          else
            echo "✅ No stray console.log found"
          fi

  # ──────────────────────────────────────────────────────────
  # JOB 2: Build Web (Vite)
  # Runs after lint. Vercel & Netlify deploy from this build.
  # ──────────────────────────────────────────────────────────
  build-web:
    name: 🌐 Build Web (Vite)
    runs-on: ubuntu-latest
    needs: lint
    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Build (production)
        run: npm run build
        env:
          VITE_SUPABASE_URL:      ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
          VITE_GOOGLE_AQ_API_KEY: ${{ secrets.VITE_GOOGLE_AQ_API_KEY }}
          VITE_ML_API_URL:        ${{ secrets.VITE_ML_API_URL }}

      - name: Upload dist artifact
        uses: actions/upload-artifact@v4
        with:
          name: web-dist
          path: frontend/dist
          retention-days: 3

      - name: Show bundle sizes
        run: du -sh dist/assets/*.js 2>/dev/null || true

  # ──────────────────────────────────────────────────────────
  # JOB 3: Build Android APK
  # Only on push to main/master (not PRs, not dev)
  # Uses WebView → APK just loads live Vercel URL
  # ──────────────────────────────────────────────────────────
  build-apk:
    name: 📱 Build APK (WebView)
    runs-on: ubuntu-latest
    needs: build-web
    if: >
      github.event_name == 'push' &&
      (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci --legacy-peer-deps

      - name: Build web
        working-directory: frontend
        run: npm run build
        env:
          VITE_SUPABASE_URL:      ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
          VITE_GOOGLE_AQ_API_KEY: ${{ secrets.VITE_GOOGLE_AQ_API_KEY }}
          VITE_ML_API_URL:        ${{ secrets.VITE_ML_API_URL }}

      - name: Sync Capacitor
        working-directory: frontend
        run: npx cap sync android

      - name: Build debug APK
        working-directory: frontend/android
        run: |
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon

      - name: Upload APK to GitHub Releases
        uses: softprops/action-gh-release@v2
        with:
          tag_name: apk-${{ github.run_number }}
          name: "🤖 AURA APK — Build #${{ github.run_number }}"
          body: |
            ## AURA Air Quality — Auto Build

            📱 **WebView APK** — loads live from `auraweapp.vercel.app`
            🔄 **Instant updates** — just push code, no reinstall needed
            🔗 **Deep links** — `aura://` scheme + HTTPS App Links

            **Commit:** ${{ github.sha }}
            **Date:**   ${{ github.event.head_commit.timestamp }}
            **Message:** ${{ github.event.head_commit.message }}

            > Install → enable "Unknown sources" → open link in app or browser
          files: frontend/android/app/build/outputs/apk/debug/app-debug.apk
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: aura-debug-apk
          path: frontend/android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30

  # ──────────────────────────────────────────────────────────
  # JOB 4: iOS IPA for TestFlight
  # Only on push to main/master
  # ──────────────────────────────────────────────────────────
  build-ios:
    name: 🍎 Build iOS (TestFlight)
    runs-on: macos-latest
    needs: build-web
    if: >
      github.event_name == 'push' &&
      (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci --legacy-peer-deps && npm install react-is

      - name: Build web
        working-directory: frontend
        run: npm run build
        env:
          VITE_SUPABASE_URL:      ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
          VITE_GOOGLE_AQ_API_KEY: ${{ secrets.VITE_GOOGLE_AQ_API_KEY }}
          VITE_ML_API_URL:        ${{ secrets.VITE_ML_API_URL }}

      - name: Sync Capacitor iOS
        working-directory: frontend
        run: npx cap sync ios

      - name: Install CocoaPods
        run: gem install cocoapods --no-document

      - name: Install Pod dependencies
        working-directory: frontend/ios/App
        run: pod install --repo-update

      - name: Import signing certificate
        if: ${{ env.BUILD_CERTIFICATE_BASE64 != '' }}
        env:
          BUILD_CERTIFICATE_BASE64: ${{ secrets.BUILD_CERTIFICATE_BASE64 }}
          P12_PASSWORD:             ${{ secrets.P12_PASSWORD }}
          KEYCHAIN_PASSWORD:        ${{ secrets.KEYCHAIN_PASSWORD }}
        run: |
          CERTIFICATE_PATH=$RUNNER_TEMP/certificate.p12
          KEYCHAIN_PATH=$RUNNER_TEMP/signing.keychain-db
          echo -n "$BUILD_CERTIFICATE_BASE64" | base64 --decode -o $CERTIFICATE_PATH
          security create-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH
          security set-keychain-settings -lut 21600 $KEYCHAIN_PATH
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH
          security import $CERTIFICATE_PATH -P "$P12_PASSWORD" -A \
            -t cert -f pkcs12 -k $KEYCHAIN_PATH
          security list-keychain -d user -s $KEYCHAIN_PATH

      - name: Install provisioning profile
        if: ${{ env.BUILD_PROVISION_PROFILE_BASE64 != '' }}
        env:
          BUILD_PROVISION_PROFILE_BASE64: ${{ secrets.BUILD_PROVISION_PROFILE_BASE64 }}
        run: |
          PP_PATH=$RUNNER_TEMP/profile.mobileprovision
          echo -n "$BUILD_PROVISION_PROFILE_BASE64" | base64 --decode -o $PP_PATH
          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          cp $PP_PATH ~/Library/MobileDevice/Provisioning\ Profiles/

      - name: Build iOS archive
        working-directory: frontend/ios/App
        run: |
          xcodebuild archive \
            -workspace App.xcworkspace \
            -scheme App \
            -configuration Release \
            -archivePath $RUNNER_TEMP/AURA.xcarchive \
            -destination "generic/platform=iOS" \
            CODE_SIGN_STYLE=Automatic \
            DEVELOPMENT_TEAM="${{ secrets.APPLE_TEAM_ID }}" \
            -allowProvisioningUpdates

      - name: Export IPA
        working-directory: frontend/ios/App
        run: |
          cat > $RUNNER_TEMP/ExportOptions.plist <<EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>method</key><string>app-store-connect</string>
            <key>teamID</key><string>${{ secrets.APPLE_TEAM_ID }}</string>
            <key>uploadBitcode</key><false/>
            <key>compileBitcode</key><false/>
            <key>uploadSymbols</key><true/>
          </dict>
          </plist>
          EOF
          xcodebuild -exportArchive \
            -archivePath $RUNNER_TEMP/AURA.xcarchive \
            -exportPath $RUNNER_TEMP/IPA \
            -exportOptionsPlist $RUNNER_TEMP/ExportOptions.plist \
            -allowProvisioningUpdates

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: aura-ios-ipa
          path: ${{ runner.temp }}/IPA/App.ipa
          retention-days: 30
